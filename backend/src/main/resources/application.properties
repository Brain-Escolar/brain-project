spring.application.name=brain

# datasource postgreSQL
spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USERNAME}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# jpa
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
# Flyway gerencia o schema de cada tenant; ddl-auto=none evita validação contra o schema errado na inicialização
spring.jpa.hibernate.ddl-auto=none

# Hibernate Envers
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_AUD
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true

api.security.token.secret=${JWT_SECRET:12345678}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Flyway gerenciado programaticamente por TenantFlywayMigrationService (multi-tenancy)
spring.flyway.enabled=false

server.port=${PORT:8080}

site.url=${SITE_URL:http://localhost:8080}

google.oauth.client.id=${GOOGLE_CLIENT_ID}
google.oauth.client.secret=${GOOGLE_CLIENT_SECRET}
google.calendar.api.key=${GOOGLE_CALENDAR_API_KEY}

aws.s3.bucket=brain-arquivos-prod

# Logging Configuration
logging.level.root=INFO
logging.level.br.com.brain=DEBUG

# Exibir stack trace completo em erro 500
server.error.include-stacktrace=always
server.error.include-message=always
server.error.include-binding-errors=always
