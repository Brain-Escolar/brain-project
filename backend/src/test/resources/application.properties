spring.application.name=brain

# datasource H2 para testes
spring.datasource.url=jdbc:h2:mem:testdb;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# jpa
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

#Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration,classpath:db/migration/h2
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Hibernate Envers
spring.jpa.properties.org.hibernate.envers.audit_table_suffix=_AUD
spring.jpa.properties.org.hibernate.envers.store_data_at_delete=true

api.security.token.secret=${JWT_SECRET:12345678}

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME:username}
spring.mail.password=${EMAIL_PASSWORD:password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

google.oauth.client.id=${GOOGLE_CLIENT_ID:1234567890123-abcdefghijklmnopqrstuvwxyz.apps.googleusercontent.com}
google.oauth.client.secret=${GOOGLE_CLIENT_SECRET:1234567890abcdefghijklmnopqrstuvwxyz}
google.calendar.api.key=${GOOGLE_CALENDAR_API_KEY:abcdefghijklmnopqrstuvwxyz1234567890}

site.url=${SITE_URL:http://localhost:8080}

aws.s3.bucket=brain-arquivos-dev
