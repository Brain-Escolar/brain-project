name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"

permissions:
  contents: read
  packages: write

jobs:

  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    outputs:
      image_sha_tag: ${{ steps.set-image.outputs.image_sha_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven

      - name: Run tests
        run: mvn test

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Login no GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image tags
        id: set-image
        run: |
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          BASE=ghcr.io/$OWNER/brain-project/backend
          echo "IMAGE_SHA=$BASE:${{ github.sha }}" >> $GITHUB_ENV
          echo "IMAGE_LATEST=$BASE:latest" >> $GITHUB_ENV
          echo "image_sha_tag=$BASE:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and Push Docker Image
        run: |
          docker build -t $IMAGE_SHA -t $IMAGE_LATEST -f Dockerfile .
          docker push $IMAGE_SHA
          docker push $IMAGE_LATEST

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:

      - name: Deploy na EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u MatBitt --password-stdin
            cd deploy
            docker compose pull
            docker compose up -d

            sleep 15
            if [ "$(docker inspect -f '{{.State.Running}}' spring-app 2>/dev/null)" != "true" ]; then
              echo "Container não subiu corretamente, abortando limpeza de imagens."
              exit 1
            fi

            docker image prune -af --filter "until=48h"
            docker builder prune -af --filter "until=48h"