name: Deploy Spring Boot to EC2 - Backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Java 23
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '23'

      - name: Executar Testes Automatizados
        run: mvn test

      - name: Empacotar o projeto
        run: mvn package -DskipTests

      - name: Criar chave SSH
        run: |
          echo "${{ secrets.EC2_KEY }}" > key.pem
          sudo chmod 400 key.pem

      - name: Get JAR file name
        id: jar
        run: |
            JAR_PATH=$(find target -name '*.jar' | head -n 1)
            echo "JAR=$JAR_PATH" >> "$GITHUB_ENV"
            echo "JAR_NAME=$(basename $JAR_PATH)" >> "$GITHUB_ENV"

      - name: Move JAR to current directory
        run: mv ${{ env.JAR }} ${{ env.JAR_NAME }}

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v1.0.0
        with:
            host: ${{ secrets.EC2_HOST }}
            username: ${{ secrets.EC2_USER }}
            key: ${{ secrets.EC2_KEY }}
            port: 22
            source: ${{ env.JAR_NAME }}
            target: /home/${{ secrets.EC2_USER }}/deploy/

      - name: Rodar o Docker Compose na EC2
        run: |
          ssh -i key.pem -o StrictHostKeyChecking=no ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            cd deploy
            docker compose down || true
            docker system prune -af --volumes=false
            docker compose build --no-cache
            docker compose up -d
          EOF
